<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CERTVERIFY | University Admin Portal</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="grid-container">

    <!-- Fixed Sidebar (280px) -->
    <aside class="grid-sidebar">
        <header style="margin-bottom: 60px; padding-bottom: 30px; border-bottom: 4px solid var(--text-primary);">
            <p class="label">INDIAN UNIVERSITY</p>
            <h3 style="font-size: 28px;">CERT<br>VERIFY</h3>
        </header>

        <nav id="navMenu">
            <!-- Navigation Links Rendered by JS -->
        </nav>

        <div style="margin-top: auto; padding-top: 40px; border-top: 1px solid var(--border);">
            <p id="activeUserEmail" class="mono" style="opacity: 0.5; margin-bottom: 10px;"></p>
            <div id="activeUserRole" class="badge">ROLE</div>
            <a href="#" onclick="Storage.logout()" class="nav-link" style="color: var(--status-revoked); margin-top: 30px;">[ LOG OUT ]</a>
        </div>
    </aside>

    <!-- Main Workspace -->
    <main class="grid-main">
        <header style="margin-bottom: 80px; padding-bottom: 20px; border-bottom: 1px solid var(--text-primary); display: flex; justify-content: space-between; align-items: flex-end;">
            <div>
                <p class="label">MODULE / PAGE</p>
                <h1 id="pageTitle">DASHBOARD</h1>
            </div>
            <div style="padding-bottom: 10px;">
                <p class="mono" style="font-size: 10px; opacity: 0.5;">LOGIN STATUS: SUCCESSFUL ✓</p>
            </div>
        </header>

        <div id="moduleContainer">
            <!-- Content Area -->
        </div>
    </main>

    <!-- Generic Modal (Simple Style) -->
    <div id="modalOverlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center;">
        <div style="background: #fff; border: 1px solid var(--text-primary); width: 100%; max-width: 520px; padding: 60px; box-shadow: 20px 20px 0 #000;">
            <p class="label">ADD / UPDATE ENTRY</p>
            <h2 id="modalTitle" style="margin-bottom: 40px; font-size: 32px;">FILL FORM</h2>
            <div id="modalBody"></div>
            <div style="display:flex; justify-content:flex-end; gap:20px; margin-top: 40px; border-top: 1px solid var(--border); padding-top: 30px;">
                <button class="btn btn-outline" id="modalCancelBtn">CANCEL</button>
                <button class="btn btn-primary" id="modalSubmitBtn">SAVE RECORD</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="assets/js/storage.js"></script>
    <script src="assets/js/dashboard.js"></script>

</body>
</html>
