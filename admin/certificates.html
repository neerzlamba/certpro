<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificates | Admin | CertPro</title>
    <link rel="stylesheet" href="../assets/style.css">
</head>
<body>
    <div class="wrapper">
        <div id="sidebar-container"></div>
        <main class="main-content">
            <div class="page-header">
                <h1 class="page-title">University Certificates Ledger</h1>
                <div style="display:flex;gap:10px;">
                    <button class="btn" id="btnExport" style="display:none;align-items:center;gap:6px;border:1px solid var(--border-color);" onclick="exportCerts()"><i data-lucide="download" style="width:16px;height:16px;"></i> Export CSV</button>
                    <button class="btn btn-primary" id="btnIssue" style="display:none;align-items:center;gap:6px;" onclick="openCertModal()"><i data-lucide="plus" style="width:16px;height:16px;"></i> Issue New Certificate</button>
                </div>
            </div>

            <div class="card" style="margin-bottom: 20px;">
                <input type="text" id="searchInput" placeholder="Search by ID or Date..." style="max-width:300px;" oninput="loadData()">
            </div>

            <div class="card">
                <div id="certsTable"></div>
            </div>
        </main>
    </div>

    <!-- Create Cert Modal -->
    <div id="certModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Issue Certificate</h2>
                <button class="modal-close" onclick="closeModal('certModal')">✕</button>
            </div>
            <form id="certForm">
                <input type="hidden" id="certId">
                <div class="form-group">
                    <label>Select Student</label>
                    <select id="certStudent" required></select>
                </div>
                <div class="form-group">
                    <label>Course Type</label>
                    <select id="certCourse" required></select>
                </div>
                <div class="form-group">
                    <label>Certificate Type</label>
                    <select id="certType" required></select>
                </div>
                <div class="form-group">
                    <label>Issue Date</label>
                    <input type="date" id="certDate" required>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn" style="color:var(--text-main); border:1px solid #ccc; background:#fff" onclick="closeModal('certModal')">Cancel</button>
                    <button type="submit" class="btn btn-primary">Generate & Issue</button>
                </div>
            </form>
        </div>
    </div>

    <!-- View Modal -->
    <div id="viewModal" class="modal-overlay">
        <div class="modal-content" style="max-width:600px;">
            <div class="modal-header">
                <h2>Certificate Records</h2>
                <button class="modal-close" onclick="closeModal('viewModal')">✕</button>
            </div>
            <div id="viewContent" style="line-height:2;"></div>
            <div class="modal-footer">
                <button type="button" class="btn btn-primary" onclick="closeModal('viewModal')">Close</button>
            </div>
        </div>
    </div>

    <script src="../assets/db.js"></script>
    <script src="../assets/auth.js"></script>
    <script src="../assets/app.js"></script>
    <script>
        const session = requireRoles(['admin', 'staff', 'superadmin']);
        let myCerts = [];

        if (session) {
            renderNav(session.role);
            if(hasPermission('create_cert')) document.getElementById('btnIssue').style.display = 'flex';
            if(hasPermission('export_data')) document.getElementById('btnExport').style.display = 'flex';
            loadDropdowns();
            loadData();
        }

        function loadDropdowns() {
            const students = getAll('students').filter(s => s.universityId === session.universityId);
            let sHtml = '<option value="">Select Student...</option>';
            students.forEach(s => sHtml += `<option value="${s.id}">${getUserName(s.userId)}</option>`);
            document.getElementById('certStudent').innerHTML = sHtml;

            const courses = getAll('courseTypes').filter(c => c.status === 'active');
            let cHtml = '';
            courses.forEach(c => cHtml += `<option value="${c.id}">${c.name}</option>`);
            document.getElementById('certCourse').innerHTML = cHtml;

            const certTypes = getAll('certTypes').filter(c => c.status === 'active');
            let ctHtml = '';
            certTypes.forEach(c => ctHtml += `<option value="${c.id}">${c.name}</option>`);
            document.getElementById('certType').innerHTML = ctHtml;

            document.getElementById('certDate').value = new Date().toISOString().split('T')[0];
        }

        function loadData() {
            myCerts = getAll('certificates').filter(c => c.universityId === session.universityId);
            myCerts.sort((a,b) => new Date(b.issuedAt) - new Date(a.issuedAt));

            const search = document.getElementById('searchInput').value.toLowerCase();
            let filtered = myCerts.filter(c => c.id.toLowerCase().includes(search) || c.issuedAt.includes(search));

            const headers = ['Cert ID', 'Student', 'Course Format', 'Cert Type', 'Date', 'Generated By', 'Status', 'Actions'];
            const rows = filtered.map(c => {
                const s = getById('students', c.studentId);
                const stuName = s ? getUserName(s.userId) : 'Unknown';
                const staffName = getUserName(c.issuedBy);
                
                let actionHtml = `<div style="display:flex;gap:4px;">`;
                actionHtml += `<button class="btn btn-primary" style="padding:4px 8px;font-size:0.75rem;" onclick="viewCert('${c.id}')"><i data-lucide="eye" style="width:12px;height:12px;"></i></button>`;
                
                if (c.status === 'pending' && hasPermission('approve_cert')) {
                    actionHtml += `<button class="btn btn-success" style="padding:4px 8px;font-size:0.75rem;" onclick="updateStatus('${c.id}', 'approve')"><i data-lucide="check" style="width:12px;height:12px;"></i></button>`;
                }
                if (hasPermission('send_notify')) {
                    actionHtml += `<button class="btn" style="padding:4px 8px;font-size:0.75rem;background:var(--bg-tertiary);border:1px solid var(--border-color);" onclick="notifyStudent('${c.studentId}', 'Certificate ${c.id}')" title="Send Notification"><i data-lucide="bell" style="width:12px;height:12px;"></i></button>`;
                }
                if (c.status !== 'revoked' && c.status !== 'pending' && hasPermission('revoke_cert')) {
                    actionHtml += `<button class="btn" style="padding:4px 8px;font-size:0.75rem;background:#f57c00;color:#fff;" onclick="updateStatus('${c.id}', 'revoke')"><i data-lucide="slash" style="width:12px;height:12px;"></i></button>`;
                }
                if (hasPermission('edit_cert')) {
                    actionHtml += `<button class="btn btn-primary" style="padding:4px 8px;font-size:0.75rem;" onclick="openCertModal('${c.id}')"><i data-lucide="edit-3" style="width:12px;height:12px;"></i></button>`;
                }
                if (hasPermission('delete_cert')) {
                    actionHtml += `<button class="btn btn-danger" style="padding:4px 8px;font-size:0.75rem;" onclick="deleteCert('${c.id}')"><i data-lucide="trash-2" style="width:12px;height:12px;"></i></button>`;
                }
                actionHtml += `</div>`;
                
                return [
                    `<div style="display:flex;align-items:center;gap:8px;">
                        <span style="font-family:monospace;font-size:0.8rem">${c.id}</span>
                        <button class="btn" style="padding:2px 6px;font-size:0.7rem;background:var(--bg-secondary);color:var(--text-primary);" title="Copy ID" onclick="copyText('${c.id}')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg></button>
                    </div>`,
                    stuName,
                    getCourseTypeName(c.courseTypeId),
                    getCertTypeName(c.certTypeId),
                    formatDate(c.issuedAt),
                    staffName,
                    getStatusBadge(c.status),
                    actionHtml
                ];
            });
            renderTable('certsTable', headers, rows);
            if (window.lucide) window.lucide.createIcons();
        }

        window.notifyStudent = function(stuId, context) {
            if(!hasPermission('send_notify')) return toast('Permission Denied', 'error');
            const msg = window.prompt(`Send notification to student regarding ${context}:`, "Your certificate has been processed.");
            if(msg === null) return;
            toast("Notification sent to student email & portal", "success");
        }

        window.exportCerts = function() {
            if(!hasPermission('export_data')) return toast('Permission Denied', 'error');
            let csv = "ID,Student,Course,Date,Status\n";
            myCerts.forEach(c => {
                const s = getById('students', c.studentId);
                const sName = s ? getUserName(s.userId) : 'Unknown';
                csv += `${c.id},"${sName}","${getCourseTypeName(c.courseTypeId)}",${c.issuedAt},${c.status}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('hidden', '');
            a.setAttribute('href', url);
            a.setAttribute('download', 'certificates_export.csv');
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            toast("Export triggered", "success");
        }

        window.updateStatus = function(id, action) {
            if (action === 'approve') {
                if(!hasPermission('approve_cert')) return toast('Permission Denied', 'error');
                update('certificates', id, { status: 'issued' });
                logAction('APPROVE_CERT', id, 'Certificate approved');
                toast("Certificate Issued", "success");
            } else if (action === 'revoke') {
                if(!hasPermission('revoke_cert')) return toast('Permission Denied', 'error');
                const remarks = prompt("Please enter the reason for revoking this certificate:");
                if (remarks !== null && remarks.trim() !== '') {
                    update('certificates', id, { status: 'revoked', revokeReason: remarks.trim(), revokedAt: new Date().toISOString().split('T')[0] });
                    logAction('REVOKE_CERT', id, `Reason: ${remarks.trim()}`);
                    toast("Certificate revoked", "info");
                } else if (remarks !== null) {
                    toast("You must provide a reason", "error");
                    return;
                }
            }
            loadData();
        }

        window.deleteCert = function(id) {
            if(!hasPermission('delete_cert')) return toast('Permission Denied', 'error');
            const reason = prompt("Please provide a reason to permanently delete this certificate:");
            if (reason) {
                confirmDelete(`Are you sure you want to delete this certificate? Reason: ${reason}`, () => {
                    remove('certificates', id);
                    logAction('DELETE_CERT', id, `Reason: ${reason.trim()}`);
                    toast("Certificate record deleted", "success");
                    loadData();
                });
            } else if (reason !== null) {
                toast("Action cancelled. A reason is required.", "error");
            }
        }

        window.openCertModal = function(id = null) {
            if (id && !hasPermission('edit_cert')) return toast('Permission Denied', 'error');
            if (!id && !hasPermission('create_cert')) return toast('Permission Denied', 'error');

            document.getElementById('certForm').reset();
            document.getElementById('certId').value = '';
            document.getElementById('certDate').value = new Date().toISOString().split('T')[0];
            
            if (typeof id === 'string' && id) {
                const c = getById('certificates', id);
                if (c) {
                    document.getElementById('certId').value = c.id;
                    document.getElementById('certStudent').value = c.studentId;
                    document.getElementById('certCourse').value = c.courseTypeId;
                    document.getElementById('certType').value = c.certTypeId;
                    document.getElementById('certDate').value = c.issuedAt;
                }
            }
            openModal('certModal');
        }

        document.getElementById('certForm').onsubmit = function(e) {
            e.preventDefault();
            const id = document.getElementById('certId').value;
            const data = {
                studentId: document.getElementById('certStudent').value,
                courseTypeId: document.getElementById('certCourse').value,
                certTypeId: document.getElementById('certType').value,
                issuedAt: document.getElementById('certDate').value
            };

            if (id) {
                if(!hasPermission('edit_cert')) return toast('Permission Denied', 'error');
                update('certificates', id, data);
                logAction('EDIT_CERT', id, 'Certificate details updated');
                toast("Certificate updated successfully");
            } else {
                if(!hasPermission('create_cert')) return toast('Permission Denied', 'error');
                const stuId  = document.getElementById('certStudent').value;
                const ctId   = document.getElementById('certType').value;
                const stuProfile = getAll('students').find(s => s.id === stuId);
                const stuUser    = stuProfile ? getById('users', stuProfile.userId) : null;
                const certType   = getById('certTypes', ctId);
                data.id          = generateCertId(session.universityId, stuUser ? stuUser.name : '', certType ? certType.name : '');
                data.universityId = session.universityId;
                data.issuedBy = session.userId;
                data.status = 'issued';
                data.remarks = '';
                create('certificates', data);
                toast("Certificate generated and issued");
            }
            closeModal('certModal');
            loadData();
        }

        window.viewCert = function(id) {
            const c = getById('certificates', id);
            if (!c) return;
            const stu = getById('students', c.studentId);
            const content = document.getElementById('viewContent');
            content.innerHTML = `
                <p><strong>Certificate ID:</strong> ${c.id}</p>
                <p><strong>Student Name:</strong> ${stu ? getUserName(stu.userId) : 'Unknown'}</p>
                <p><strong>Course Type:</strong> ${getCourseTypeName(c.courseTypeId)}</p>
                <p><strong>Certificate Type:</strong> ${getCertTypeName(c.certTypeId)}</p>
                <p><strong>Issued By:</strong> ${getUserName(c.issuedBy)}</p>
                <p><strong>Issued Date:</strong> ${formatDate(c.issuedAt)}</p>
                <p><strong>Remarks:</strong> ${c.remarks || 'None'}</p>
                <p><strong>Current Status:</strong> ${getStatusBadge(c.status)}</p>
            `;
            openModal('viewModal');
        }
    </script>
</body>
</html>
