<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | CertPro</title>
    <link rel="stylesheet" href="../assets/style.css">
</head>
<body>
    <div class="wrapper">
        <div id="sidebar-container"></div>
        <main class="main-content">
            <div class="page-header">
                <h1 class="page-title">University Scope: <span id="uniNameLabel">...</span></h1>
            </div>

            <div class="stat-grid">
                <div class="stat-card">
                    <h3>My Students</h3>
                    <div class="value" id="count-students">0</div>
                </div>
                <div class="stat-card">
                    <h3>My Staff</h3>
                    <div class="value" id="count-staff">0</div>
                </div>
                <div class="stat-card">
                    <h3>Certs Issued</h3>
                    <div class="value" id="count-certs">0</div>
                </div>
                <div class="stat-card">
                    <h3 style="color:var(--badge-pending-color);">Pending Requests</h3>
                    <div class="value" id="count-pending">0</div>
                </div>
            </div>

            <div id="globalStatsSection" style="display:none; margin-top:40px;">
                <div class="page-header">
                    <h1 class="page-title"><i data-lucide="globe" style="width:20px;height:20px;margin-right:8px;vertical-align:middle;"></i> System-Wide Multi-Uni Statistics</h1>
                </div>
                <div class="stat-grid">
                    <div class="stat-card" style="border-left:4px solid var(--accent-color);">
                        <h3>Total Global Students</h3>
                        <div class="value" id="global-students">0</div>
                    </div>
                    <div class="stat-card" style="border-left:4px solid var(--badge-issued-bg);">
                        <h3>Total Global Certificates</h3>
                        <div class="value" id="global-certs">0</div>
                    </div>
                    <div class="stat-card" style="border-left:4px solid var(--badge-pending-bg);">
                        <h3>Open Requests (Global)</h3>
                        <div class="value" id="global-reqs">0</div>
                    </div>
                </div>
            </div>
            
        </main>
    </div>

    <script src="../assets/db.js"></script>
    <script src="../assets/auth.js"></script>
    <script src="../assets/app.js"></script>
    <script>
        const session = requireRoles(['admin', 'staff', 'superadmin']);
        if (session) {
            renderNav(session.role);
            document.getElementById('uniNameLabel').innerText = (session.role === 'superadmin') ? 'All Universities (Global)' : getUniversityName(session.universityId);
            
            if(hasPermission('view_global_data')) {
                document.getElementById('globalStatsSection').style.display = 'block';
            }
            
            loadDashboard();
            if(window.lucide) window.lucide.createIcons();
        }

        function loadDashboard() {
            const myStudents = getAll('students').filter(s => s.universityId === session.universityId);
            const myStaff = getAll('staff').filter(s => s.universityId === session.universityId);
            const myCerts = getAll('certificates').filter(c => c.universityId === session.universityId && c.status === 'issued');
            
            const myRequests = getAll('requests').filter(r => 
                r.universityId === session.universityId && 
                (r.status === 'pending' || r.status === 'forwarded')
            );

            document.getElementById('count-students').innerText = myStudents.length;
            document.getElementById('count-staff').innerText = myStaff.length;
            document.getElementById('count-certs').innerText = myCerts.length;
            document.getElementById('count-pending').innerText = myRequests.length;

            if(hasPermission('view_global_data')) {
                document.getElementById('global-students').innerText = getAll('students').length;
                document.getElementById('global-certs').innerText = getAll('certificates').length;
                document.getElementById('global-reqs').innerText = getAll('requests').length;
            }
        }
    </script>
</body>
</html>
