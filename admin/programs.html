<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Degree Programs | CertPro.io</title>
    <link rel="stylesheet" href="../assets/style.css">
</head>
<body class="layout">

    <div id="sidebarContainer"></div>
    <div id="toastContainer" class="toast-container"></div>

    <main class="main-content">
        <header style="margin-bottom: 60px; display: flex; justify-content: space-between; align-items: flex-end;">
            <div>
                <p class="label">Our Academic Streams</p>
                <h1>Degree Programs</h1>
                <p style="color: var(--text-muted);">Manage the academic programs offered by your college.</p>
            </div>
            <button class="btn btn-primary" onclick="openModal()">Register New Program</button>
        </header>

        <div class="card" style="padding: 0; overflow: hidden;">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Program Name</th>
                        <th>Duration</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="programTableBody">
                    <!-- Rendered via JS -->
                </tbody>
            </table>
        </div>
    </main>

    <!-- Modal refined -->
    <div id="programModal" class="modal-overlay" style="display: none;">
        <div class="modal" style="max-width: 500px; border-radius: 0;">
            <h2 id="modalTitle">Register Program</h2>
            <p class="label" style="margin-bottom: 40px; color:var(--accent-gold);">Program Details</p>
            
            <form id="programForm">
                <input type="hidden" id="editProgramId">
                <div class="form-group">
                    <label class="label">OFFICIAL PROGRAM NAME</label>
                    <input type="text" id="progName" required placeholder="e.g. B.Tech Computer Science">
                </div>
                <div class="form-group">
                    <label class="label">PROGRAM DURATION</label>
                    <input type="text" id="progDuration" required placeholder="e.g. 4 Years">
                </div>
                
                <div style="margin-top: 40px; display: flex; gap: 20px; justify-content: flex-end;">
                    <button type="button" class="btn btn-outline" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="submitBtn">Save Academic Program</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Core Scripts -->
    <script src="../assets/db.js"></script>
    <script src="../assets/auth.js"></script>
    <script src="../assets/utils.js"></script>

    <script>
        const session = Auth.guardPage('admin');
        if (session) {
            if (!Auth.guardPermission('manage_programs')) return;
            Utils.renderSidebar('admin', 'programs');
            loadPrograms();
        }

        function loadPrograms() {
            const data = Auth.scopedData('programs');
            const tbody = document.getElementById('programTableBody');
            
            tbody.innerHTML = data.map(p => `
                <tr>
                    <td class="mono" style="font-size:11px; opacity:0.5;">${p.id}</td>
                    <td style="font-weight:700;">${p.name}</td>
                    <td style="font-size:12px;">${p.duration}</td>
                    <td><span class="badge ${p.status === 'active' ? 'badge-success' : 'badge-danger'}">${p.status}</span></td>
                    <td>
                        <button onclick="editProgram('${p.id}')" class="btn btn-outline" style="padding:6px 12px; font-size:9px;">EDIT</button>
                    </td>
                </tr>
            `).join('') || '<tr><td colspan="100%" style="text-align:center; padding:100px; opacity:0.3;">No Active Programs</td></tr>';
        }

        function openModal(id = null) {
            const modal = document.getElementById('programModal');
            const form = document.getElementById('programForm');
            modal.style.display = 'flex';
            if (id) {
                const p = DB.getById('programs', id);
                document.getElementById('modalTitle').textContent = "Modify Program";
                document.getElementById('editProgramId').value = p.id;
                document.getElementById('progName').value = p.name;
                document.getElementById('progDuration').value = p.duration;
                document.getElementById('submitBtn').textContent = "Update Stream";
            } else {
                form.reset();
                document.getElementById('modalTitle').textContent = "Add Academic Program";
                document.getElementById('editProgramId').value = "";
                document.getElementById('submitBtn').textContent = "Save Stream";
            }
        }

        function closeModal() { document.getElementById('programModal').style.display = 'none'; }
        document.getElementById('programForm').onsubmit = (e) => {
            e.preventDefault();
            const id = document.getElementById('editProgramId').value;
            const data = {
                name: document.getElementById('progName').value,
                duration: document.getElementById('progDuration').value,
                universityId: session.universityId,
                status: 'active'
            };
            if (id) {
                DB.update('programs', id, data);
            } else {
                data.id = DB.generateId('PROG');
                DB.create('programs', data);
            }
            closeModal(); loadPrograms();
        };

        window.editProgram = (id) => openModal(id);
    </script>
</body>
</html>
