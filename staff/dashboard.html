<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Dashboard | CertPro</title>
    <link rel="stylesheet" href="../assets/style.css">
</head>
<body>
    <div class="wrapper">
        <div id="sidebar-container"></div>
        <main class="main-content">
            <div class="page-header">
                <h1 class="page-title">Staff Portal - <span id="uniNameLabel">...</span></h1>
            </div>

            <div class="stat-grid">
                <div class="stat-card">
                    <h3 style="color:var(--badge-pending-color);">Pending Requests to Process</h3>
                    <div class="value" id="count-pending">0</div>
                </div>
                <div class="stat-card">
                    <h3 style="color:var(--badge-issued-color);">Certificates Issued By Me</h3>
                    <div class="value" id="count-issued">0</div>
                </div>
            </div>

            <div class="card">
                <h2 style="font-size:1.1rem; margin-bottom:16px; border-bottom:1px solid var(--border-color); padding-bottom:8px;">My Recent Certificates</h2>
                <div id="table-recent"></div>
            </div>
            
        </main>
    </div>

    <script src="../assets/db.js"></script>
    <script src="../assets/auth.js"></script>
    <script src="../assets/app.js"></script>
    <script>
        const session = requireRoles(['staff']);
        if (session) {
            renderNav('staff');
            document.getElementById('uniNameLabel').innerText = getUniversityName(session.universityId);
            loadDashboard();
        }

        function loadDashboard() {
            const requests = getAll('requests').filter(r => r.universityId === session.universityId && r.status === 'pending');
            const myCerts = getAll('certificates').filter(c => c.issuedBy === session.userId);

            document.getElementById('count-pending').innerText = requests.length;
            document.getElementById('count-issued').innerText = myCerts.length;

            const recent = myCerts
                .sort((a,b) => new Date(b.issuedAt) - new Date(a.issuedAt))
                .slice(0, 5);
            
            const headers = ['Cert ID', 'Student', 'Course Type', 'Status'];
            const rows = recent.map(c => {
                const s = getById('students', c.studentId);
                const sName = s ? getUserName(s.userId) : 'Unknown';
                return [
                    c.id,
                    sName,
                    getCourseTypeName(c.courseTypeId),
                    getStatusBadge(c.status)
                ];
            });
            renderTable('table-recent', headers, rows);
        }
    </script>
</body>
</html>
