<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificates | Superadmin | CertPro</title>
    <link rel="stylesheet" href="../assets/style.css">
</head>
<body>
    <div class="wrapper">
        <div id="sidebar-container"></div>
        <main class="main-content">
            <div class="page-header">
                <h1 class="page-title">Global Master Certificates Database</h1>
            </div>

            <div class="card" style="margin-bottom: 20px; display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
                <input type="text" id="searchInput" placeholder="Search ID or date..." style="max-width:250px;" oninput="applyFilters()">
                <select id="statusFilter" style="max-width:200px;" onchange="applyFilters()">
                    <option value="all">All Statuses</option>
                    <option value="pending">Pending</option>
                    <option value="approved">Approved</option>
                    <option value="issued">Issued</option>
                    <option value="revoked">Revoked</option>
                </select>
                <select id="uniFilter" style="max-width:250px;" onchange="applyFilters()">
                    <!-- Filled by JS -->
                </select>
                <div style="flex-grow:1; text-align:right;">
                    <button class="btn btn-primary" onclick="window.openIssueModal()">+ Issue Cert</button>
                </div>
            </div>

            <div class="card">
                <div id="certsTable"></div>
            </div>
        </main>
    </div>

    <!-- View Modal -->
    <div id="viewModal" class="modal-overlay">
        <div class="modal-content" id="certBoxWrapper" style="max-width:700px;">
            <div class="modal-header">
                <h2>Certificate Document</h2>
                <button class="modal-close" onclick="closeModal('viewModal')">✕</button>
            </div>
            
            <div id="certContainer" style="background:#fff; border: 12px solid #000; padding:40px; text-align:center; position:relative; min-height:400px; display:flex; flex-direction:column; justify-content:center;">
                <h1 style="font-family:serif; font-size:2.5rem; margin-bottom:10px; color:var(--text-main)" id="cUni">University Name</h1>
                <h3 style="font-family:serif; font-weight:normal; color:#555; margin-bottom:30px;" id="cType">Certificate Type</h3>
                
                <p style="font-size:1.1rem; margin-bottom:10px;">This is to certify that</p>
                <h2 style="font-size:2rem; font-family:serif; margin-bottom:10px; text-decoration:underline;" id="cStudent">Student Name</h2>
                
                <p style="font-size:1.1rem; margin-bottom:10px;">has successfully completed the requirements for</p>
                <h2 style="font-size:1.5rem; font-family:serif; margin-bottom:40px;" id="cCourse">Course Name</h2>
                
                <div style="display:flex; justify-content:space-between; margin-top:30px; border-top:1px solid #ccc; padding-top:10px;">
                    <div style="text-align:left;">
                        <p style="font-size:0.8rem; color:#777;">Certificate ID</p>
                        <strong id="cId" style="font-family:monospace;">---</strong>
                    </div>
                    <div style="text-align:right;">
                        <p style="font-size:0.8rem; color:#777;">Issue Date</p>
                        <strong id="cDate">---</strong>
                    </div>
                </div>

                <!-- QR Code Display Area in Certificate -->
                <div style="position: absolute; bottom: 40px; right: 40px; width: 90px; height: 90px; border: 1px solid #ccc; padding: 4px; background: #fff;" id="cQrBox">
                    <div style="font-size: 0.6rem; color: #999; text-align: center; display: flex; align-items: center; justify-content: center; height: 100%;">No QR</div>
                </div>
            </div>

            <div class="modal-footer" style="justify-content:space-between; margin-top:20px;">
                <div style="font-size:0.85rem; color:var(--text-secondary);" id="cStatusInfo"></div>
                <button type="button" class="btn" style="border:1px solid #ccc;" onclick="closeModal('viewModal')">Close</button>
            </div>
        </div>
    </div>

    <!-- Issue Modal -->
    <div id="issueModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Direct Universal Issuance</h2>
                <button class="modal-close" onclick="closeModal('issueModal')">✕</button>
            </div>
            <form id="issueForm">
                <div class="form-group">
                    <label>Target Student Identity</label>
                    <input type="text" id="issueSearchStudent" placeholder="Filter by name or ID..." onkeyup="filterStudentOptions()" style="margin-bottom:8px; padding:8px; border:1px dashed var(--border-color); font-size:0.85rem;" autocomplete="off">
                    <select id="issueStudentId" required></select>
                </div>
                <div class="form-group">
                    <label>Assigned Program</label>
                    <select id="issueCourseId" required></select>
                </div>
                <div class="form-group">
                    <label>Certificate Format</label>
                    <select id="issueCertTypeId" required></select>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn" style="color:var(--text-main); border:1px solid #ccc; background:#fff" onclick="closeModal('issueModal')">Cancel</button>
                    <button type="submit" class="btn btn-primary">Mint Document</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../assets/db.js"></script>
    <script src="../assets/auth.js"></script>
    <script src="../assets/app.js"></script>
    <script>
        const session = requireRole('superadmin');
        let allCerts = [];
        let allActiveStudents = [];

        if (session) {
            renderNav('superadmin');
            loadFilters();
            loadData();
        }

        function loadFilters() {
            const unis = getAll('universities');
            let html = '<option value="all">All Universities</option>';
            unis.forEach(u => html += `<option value="${u.id}">${u.name}</option>`);
            document.getElementById('uniFilter').innerHTML = html;

            // Load issue dropdowns
            allActiveStudents = getAll('students').filter(s => s.status === 'active');
            renderStudentOptions(allActiveStudents);

            const courses = getAll('courseTypes').filter(c => c.status === 'active');
            let cHtml = '<option value="">Select Course...</option>';
            courses.forEach(c => cHtml += `<option value="${c.id}">${c.name}</option>`);
            document.getElementById('issueCourseId').innerHTML = cHtml;

            const certs = getAll('certTypes').filter(c => c.status === 'active');
            let certHtml = '<option value="">Select Cert Type...</option>';
            certs.forEach(c => certHtml += `<option value="${c.id}">${c.name}</option>`);
            document.getElementById('issueCertTypeId').innerHTML = certHtml;
        }

        function loadData() {
            allCerts = getAll('certificates');
            applyFilters();
        }

        function applyFilters() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const status = document.getElementById('statusFilter').value;
            const uniId = document.getElementById('uniFilter').value;

            let filtered = allCerts.filter(c => {
                const matchSearch = c.id.toLowerCase().includes(search) || c.issuedAt.includes(search);
                const matchStatus = status === 'all' || c.status === status;
                const matchUni = uniId === 'all' || c.universityId === uniId;
                return matchSearch && matchStatus && matchUni;
            });

            // Sort newest first
            filtered.sort((a,b) => new Date(b.issuedAt) - new Date(a.issuedAt));
            renderCerts(filtered);
        }

        function renderCerts(certs) {
            const headers = ['Certificate ID', 'Student', 'Course Format', 'Type', 'University', 'Date', 'Generated By', 'Status', 'Actions'];
            const rows = certs.map(c => {
                const s = getById('students', c.studentId);
                const stuName = s ? getUserName(s.userId) : 'Unknown';
                const staffName = getUserName(c.issuedBy);
                
                let actionHtml = `<button class="btn btn-primary" style="padding:4px 8px;font-size:0.8rem;margin-right:5px;" onclick="viewCert('${c.id}')">View</button>`;
                
                if (c.status === 'pending') {
                    actionHtml += `<button class="btn btn-success" style="padding:4px 8px;font-size:0.8rem;margin-right:5px;" onclick="updateStatus('${c.id}', 'approve')">Approve</button>`;
                }
                
                if (c.status === 'issued') {
                    actionHtml += `<button class="btn" style="padding:4px 8px;font-size:0.8rem;background:#f57c00;color:#fff;margin-right:5px;" onclick="updateStatus('${c.id}', 'revoke')">Revoke</button>`;
                }
                
                actionHtml += `<button class="btn btn-danger" style="padding:4px 8px;font-size:0.8rem;" onclick="deleteCert('${c.id}')">Del</button>`;
                
                return [
                    `<div style="display:flex;align-items:center;gap:8px;">
                        <span style="font-family:monospace;font-size:0.8rem">${c.id}</span>
                        <button class="btn" style="padding:2px 6px;font-size:0.7rem;background:var(--bg-secondary);color:var(--text-primary);" title="Copy ID" onclick="copyText('${c.id}')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg></button>
                    </div>`,
                    stuName,
                    getCourseTypeName(c.courseTypeId),
                    getCertTypeName(c.certTypeId),
                    getUniversityName(c.universityId),
                    formatDate(c.issuedAt),
                    staffName,
                    getStatusBadge(c.status),
                    actionHtml
                ];
            });
            renderTable('certsTable', headers, rows);
        }

        window.updateStatus = function(id, action) {
            if (action === 'approve') {
                update('certificates', id, { status: 'issued' });
                toast("Certificate Approved & Issued", "success");
            } else if (action === 'revoke') {
                const remarks = prompt("Please enter the reason for revoking this certificate:");
                if (remarks !== null && remarks.trim() !== '') {
                    update('certificates', id, { status: 'revoked', remarks: remarks });
                    toast("Certificate Revoked", "success");
                } else if (remarks !== null) {
                    toast("You must provide a reason", "error");
                    return;
                }
            }
            loadData();
        }

        window.deleteCert = function(id) {
            const reason = prompt("Please enter the reason for deleting this permanent ledger record:");
            if (!reason) return;

            confirmDelete(`Delete this certificate permanently? Reason: ${reason}`, () => {
                remove('certificates', id);
                toast("Certificate logically deleted", "success");
                loadData();
            });
        }

        window.viewCert = function(id) {
            const c = getById('certificates', id);
            if (!c) return;

            const cType = getById('certTypes', c.certTypeId);
            if (cType) {
                document.getElementById('certContainer').style.borderColor = cType.borderColor;
            }

            document.getElementById('cUni').innerText = getUniversityName(c.universityId);
            document.getElementById('cType').innerText = getCertTypeName(c.certTypeId);
            const stu = getById('students', c.studentId);
            document.getElementById('cStudent').innerText = stu ? getUserName(stu.userId) : 'Unknown';
            document.getElementById('cCourse').innerText = getCourseTypeName(c.courseTypeId);
            document.getElementById('cId').innerText = c.id;
            document.getElementById('cDate').innerText = formatDate(c.issuedAt);

            const qrBox = document.getElementById('cQrBox');
            if (c.qrDataUrl) {
                qrBox.innerHTML = `<img src="${c.qrDataUrl}" alt="QR" style="width:100%; height:100%; display:block;">`;
            } else {
                qrBox.innerHTML = `<div style="font-size: 0.6rem; color: #999; text-align: center; display: flex; align-items: center; justify-content: center; height: 100%;">No QR</div>`;
            }

            document.getElementById('cStatusInfo').innerHTML = `<strong>Status:</strong> ${getStatusBadge(c.status)} &nbsp; | &nbsp; <strong>Issued By:</strong> ${getUserName(c.issuedBy)}`;

            openModal('viewModal');
        }

        function renderStudentOptions(studentArray) {
            let stuHtml = '<option value="">Select Student...</option>';
            studentArray.forEach(s => stuHtml += `<option value="${s.id}">${getUserName(s.userId)} (${s.id})</option>`);
            document.getElementById('issueStudentId').innerHTML = stuHtml;
        }

        window.filterStudentOptions = function() {
            const q = document.getElementById('issueSearchStudent').value.toLowerCase();
            const filtered = allActiveStudents.filter(s => {
                return getUserName(s.userId).toLowerCase().includes(q) || s.id.toLowerCase().includes(q);
            });
            renderStudentOptions(filtered);
        }

        window.openIssueModal = function() {
            document.getElementById('issueForm').reset();
            openModal('issueModal');
        }

        document.getElementById('issueForm').onsubmit = function(e) {
            e.preventDefault();
            const sId = document.getElementById('issueStudentId').value;
            const cId = document.getElementById('issueCourseId').value;
            const ctId = document.getElementById('issueCertTypeId').value;

            const stu = getById('students', sId);
            if(!stu) return;

            const certData = {
                id: generateId('CERT'),
                studentId: sId,
                courseTypeId: cId,
                certTypeId: ctId,
                universityId: stu.universityId,
                issuedBy: session.userId,
                issuedAt: new Date().toISOString().split('T')[0],
                status: 'issued',
                remarks: 'Direct Mint via Superadmin'
            };
            create('certificates', certData);
            
            toast("Certificate Successfully Minted", "success");
            closeModal('issueModal');
            loadData();
        }
    </script>
</body>
</html>
