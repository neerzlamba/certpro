<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universities | Superadmin | CertPro</title>
    <link rel="stylesheet" href="../assets/style.css">
</head>
<body>
    <div class="wrapper">
        <div id="sidebar-container"></div>
        <main class="main-content">
            <div class="page-header">
                <h1 class="page-title"><i data-lucide="building" style="width:24px;height:24px;margin-right:8px;vertical-align:bottom;"></i> Universities Network</h1>
                <button class="btn btn-primary" style="display:flex;align-items:center;gap:6px;" onclick="openUniModal()"><i data-lucide="plus" style="width:16px;height:16px;"></i> Register University</button>
            </div>

            <div class="card" style="margin-bottom: 20px;">
                <input type="text" id="searchInput" placeholder="Search by name..." style="max-width:300px;" oninput="loadData()">
            </div>

            <div class="card">
                <div id="uniTable"></div>
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div id="uniModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header" style="border-bottom:2px solid var(--border-color); padding-bottom:12px; margin-bottom:16px;">
                <h2 id="modalTitle" style="margin:0; display:flex; align-items:center; gap:8px;"><i data-lucide="building" style="width:20px;height:20px;"></i> Register University</h2>
                <button class="modal-close" style="background:none;border:none;cursor:pointer;font-size:1.2rem;" onclick="closeModal('uniModal')">✕</button>
            </div>
            <form id="uniForm">
                <input type="hidden" id="uniId">
                <div class="form-group" style="margin-bottom:12px;">
                    <label style="display:block; font-size:0.75rem; text-transform:uppercase; font-weight:700; margin-bottom:6px; color:var(--text-secondary);">University Name <span style="color:var(--btn-danger)">*</span></label>
                    <input type="text" id="uniName" style="width:100%; padding:8px;" required>
                </div>
                <div class="form-row" style="margin-bottom:12px;">
                    <div class="form-group">
                        <label style="display:block; font-size:0.75rem; text-transform:uppercase; font-weight:700; margin-bottom:6px; color:var(--text-secondary);">Email</label>
                        <input type="email" id="uniEmail" style="width:100%; padding:8px;">
                    </div>
                    <div class="form-group">
                        <label style="display:block; font-size:0.75rem; text-transform:uppercase; font-weight:700; margin-bottom:6px; color:var(--text-secondary);">Contact Number</label>
                        <input type="text" id="uniPhone" style="width:100%; padding:8px;">
                    </div>
                </div>
                <div class="form-group" style="margin-bottom:12px;">
                    <label style="display:block; font-size:0.75rem; text-transform:uppercase; font-weight:700; margin-bottom:6px; color:var(--text-secondary);">Website</label>
                    <input type="text" id="uniWebsite" style="width:100%; padding:8px;" placeholder="https://...">
                </div>
                <div class="form-group" style="margin-bottom:12px;">
                    <label style="display:block; font-size:0.75rem; text-transform:uppercase; font-weight:700; margin-bottom:6px; color:var(--text-secondary);">Address <span style="color:var(--btn-danger)">*</span></label>
                    <textarea id="uniAddress" style="width:100%; padding:8px; min-height:60px;" required></textarea>
                </div>
                <div class="form-row" style="margin-bottom:20px;">
                    <div class="form-group">
                        <label style="display:block; font-size:0.75rem; text-transform:uppercase; font-weight:700; margin-bottom:6px; color:var(--text-secondary);">Assign Primary Admin</label>
                        <select id="uniAdmin" style="width:100%; padding:8px;">
                            <!-- Filled by JS -->
                        </select>
                    </div>
                    <div class="form-group">
                        <label style="display:block; font-size:0.75rem; text-transform:uppercase; font-weight:700; margin-bottom:6px; color:var(--text-secondary);">Status</label>
                        <select id="uniStatus" style="width:100%; padding:8px;" required>
                            <option value="active">Active</option>
                            <option value="inactive">Inactive</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer" style="display:flex; justify-content:flex-end; gap:10px; border-top:1px solid var(--border-color); padding-top:16px;">
                    <button type="button" class="btn" style="color:var(--text-main); border:1px solid #ccc; background:#fff" onclick="closeModal('uniModal')">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Details</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../assets/db.js"></script>
    <script src="../assets/auth.js"></script>
    <script src="../assets/app.js"></script>
    <script>
        const session = requireRoles(['superadmin', 'admin']);
        let allUnis = [];

        if (session) {
            renderNav(session.role);
            if(!hasPermission('manage_unis') && session.role !== 'superadmin') {
                window.location.href = '../portal.html?tab=login';
            }
            loadData();
        }

        function loadData() {
            allUnis = getAll('universities');
            const search = document.getElementById('searchInput').value.toLowerCase();
            
            let filtered = allUnis.filter(u => u.name.toLowerCase().includes(search));
            
            loadAdminsDropdown();

            const headers = ['Name', 'Contact', 'Admins', 'Status', 'Actions'];
            const rows = filtered.map(u => {
                const isInactive = u.status === 'inactive';
                const statusBtn = isInactive 
                    ? `<button class="btn btn-success" style="padding:4px 8px;font-size:0.8rem;" onclick="toggleStatus('${u.id}', 'active')"><i data-lucide="check" style="width:14px;height:14px;"></i></button>` 
                    : `<button class="btn" style="padding:4px 8px;font-size:0.8rem;background:#f57c00;color:#fff;" onclick="toggleStatus('${u.id}', 'inactive')"><i data-lucide="power" style="width:14px;height:14px;"></i></button>`;
                
                const adminsList = u.adminIds.map(aid => getUserName(aid)).join(', ') || '<span style="color:var(--text-tertiary)">None</span>';
                
                let contactInfo = `<div style="font-size:0.8rem; line-height:1.4;">`;
                if(u.email) contactInfo += `<div>✉ ${u.email}</div>`;
                if(u.phone) contactInfo += `<div>📞 ${u.phone}</div>`;
                if(u.website) contactInfo += `<div>🌐 <a href="${u.website.startsWith('http')?u.website:'https://'+u.website}" target="_blank" style="color:var(--btn-primary);text-decoration:none;">${u.website}</a></div>`;
                contactInfo += `</div>`;
                if(!u.email && !u.phone && !u.website) contactInfo = `<span style="font-size:0.8rem;color:var(--text-secondary)">${u.address}</span>`;

                return [
                    `<strong>${u.name}</strong>`,
                    contactInfo,
                    adminsList,
                    getStatusBadge(u.status),
                    `<button class="btn btn-primary" style="padding:4px 8px;font-size:0.8rem;margin-right:5px;" onclick="openUniModal('${u.id}')"><i data-lucide="edit-3" style="width:14px;height:14px;"></i></button>` +
                    statusBtn +
                    `<button class="btn btn-danger" style="padding:4px 8px;font-size:0.8rem;margin-left:5px;" onclick="deleteUni('${u.id}')"><i data-lucide="trash-2" style="width:14px;height:14px;"></i></button>`
                ];
            });
            renderTable('uniTable', headers, rows);
            if (window.lucide) window.lucide.createIcons();
        }

        function loadAdminsDropdown() {
            const admins = getAll('users').filter(u => u.role === 'admin' && u.status === 'active');
            let html = '<option value="">None</option>';
            admins.forEach(a => html += `<option value="${a.id}">${a.name} (${a.email})</option>`);
            document.getElementById('uniAdmin').innerHTML = html;
        }

        function toggleStatus(id, newStatus) {
            update('universities', id, { status: newStatus });
            toast(`University status set to ${newStatus}`);
            loadData();
        }

        window.deleteUni = function(id) {
            confirmDelete("Delete this university? All linked students, staff, and certificates will remain but will lack a valid university reference.", () => {
                remove('universities', id);
                toast("University deleted", "success");
                loadData();
            });
        }

        window.openUniModal = function(id = null) {
            document.getElementById('uniForm').reset();
            document.getElementById('uniId').value = '';
            document.getElementById('modalTitle').innerHTML = '<i data-lucide="building" style="width:20px;height:20px;"></i> Register University';
            
            if (id) {
                document.getElementById('modalTitle').innerHTML = '<i data-lucide="edit-3" style="width:20px;height:20px;"></i> Edit University';
                const u = getById('universities', id);
                if (u) {
                    document.getElementById('uniId').value = u.id;
                    document.getElementById('uniName').value = u.name || '';
                    document.getElementById('uniEmail').value = u.email || '';
                    document.getElementById('uniPhone').value = u.phone || '';
                    document.getElementById('uniWebsite').value = u.website || '';
                    document.getElementById('uniAddress').value = u.address || '';
                    document.getElementById('uniStatus').value = u.status || 'active';
                    document.getElementById('uniAdmin').value = u.adminIds[0] || '';
                }
            }
            if(window.lucide) window.lucide.createIcons();
            openModal('uniModal');
        }

        document.getElementById('uniForm').onsubmit = function(e) {
            e.preventDefault();
            const id = document.getElementById('uniId').value;
            const adminId = document.getElementById('uniAdmin').value;
            const data = {
                name: document.getElementById('uniName').value,
                email: document.getElementById('uniEmail').value,
                phone: document.getElementById('uniPhone').value,
                website: document.getElementById('uniWebsite').value,
                address: document.getElementById('uniAddress').value,
                status: document.getElementById('uniStatus').value,
                adminIds: adminId ? [adminId] : []
            };

            if (id) {
                update('universities', id, data);
                toast("University updated");
            } else {
                data.id = generateId('UNI');
                data.createdAt = new Date().toISOString().split('T')[0];
                create('universities', data);
                toast("University registered");
            }
            closeModal('uniModal');
            loadData();
        }
    </script>
</body>
</html>
