<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Types | Superadmin | CertPro</title>
    <link rel="stylesheet" href="../assets/style.css">
</head>
<body>
    <div class="wrapper">
        <div id="sidebar-container"></div>
        <main class="main-content">
            <div class="page-header">
                <h1 class="page-title">Course Types Directory</h1>
                <button class="btn btn-primary" onclick="openCourseModal()">Create Course Type</button>
            </div>

            <div class="card" style="margin-bottom: 20px; display:flex; gap:10px; align-items:center;">
                <input type="text" id="searchInput" placeholder="Search course by name..." style="max-width:300px;" oninput="loadData()">
                <select id="levelFilter" style="max-width:200px;" onchange="loadData()">
                    <option value="all">All Levels</option>
                    <option value="bachelor">Bachelor</option>
                    <option value="master">Master</option>
                    <option value="diploma">Diploma</option>
                </select>
            </div>

            <div class="card">
                <div id="courseTable"></div>
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div id="courseModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Create Course Type</h2>
                <button class="modal-close" onclick="closeModal('courseModal')">✕</button>
            </div>
            <form id="courseForm">
                <input type="hidden" id="courseId">
                <div class="form-group">
                    <label>Course Name</label>
                    <input type="text" id="courseName" required placeholder="e.g. Bachelor of Science (BSc)">
                </div>
                <div class="form-group">
                    <label>Level</label>
                    <select id="courseLevel" required>
                        <option value="bachelor">Bachelor</option>
                        <option value="master">Master</option>
                        <option value="diploma">Diploma</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Duration</label>
                    <input type="text" id="courseDuration" required placeholder="e.g. 3 years">
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="courseStatus" required>
                        <option value="active">Active</option>
                        <option value="inactive">Inactive</option>
                    </select>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn" style="color:var(--text-main); border:1px solid #ccc; background:#fff" onclick="closeModal('courseModal')">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Course Type</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../assets/db.js"></script>
    <script src="../assets/auth.js"></script>
    <script src="../assets/app.js"></script>
    <script>
        const session = requireRole('superadmin');
        let allCourses = [];

        if (session) {
            renderNav('superadmin');
            loadData();
        }

        function loadData() {
            allCourses = getAll('courseTypes');
            const search = document.getElementById('searchInput').value.toLowerCase();
            const level = document.getElementById('levelFilter').value;
            
            let filtered = allCourses.filter(c => {
                const matchSearch = c.name.toLowerCase().includes(search);
                const matchLevel = level === 'all' || c.level === level;
                return matchSearch && matchLevel;
            });
            
            const headers = ['ID', 'Name', 'Level', 'Duration', 'Status', 'Actions'];
            const rows = filtered.map(c => {
                return [
                    `<span style="font-family:monospace;font-size:0.8rem">${c.id}</span>`,
                    c.name,
                    `<span style="text-transform:capitalize;">${c.level}</span>`,
                    c.duration,
                    getStatusBadge(c.status),
                    `<button class="btn btn-primary" style="padding:4px 8px;font-size:0.8rem;margin-right:5px;" onclick="openCourseModal('${c.id}')">Edit</button>` +
                    `<button class="btn btn-danger" style="padding:4px 8px;font-size:0.8rem;" onclick="deleteCourse('${c.id}')">Delete</button>`
                ];
            });
            renderTable('courseTable', headers, rows);
        }

        window.deleteCourse = function(id) {
            confirmDelete("Delete this course type? Existing certificates using this type will lose reference name capability.", () => {
                remove('courseTypes', id);
                toast("Course Type deleted", "success");
                loadData();
            });
        }

        window.openCourseModal = function(id = null) {
            document.getElementById('courseForm').reset();
            document.getElementById('courseId').value = '';
            document.getElementById('modalTitle').innerText = 'Create Course Type';
            
            if (id) {
                document.getElementById('modalTitle').innerText = 'Edit Course Type';
                const c = getById('courseTypes', id);
                if (c) {
                    document.getElementById('courseId').value = c.id;
                    document.getElementById('courseName').value = c.name;
                    document.getElementById('courseLevel').value = c.level;
                    document.getElementById('courseDuration').value = c.duration;
                    document.getElementById('courseStatus').value = c.status;
                }
            }
            openModal('courseModal');
        }

        document.getElementById('courseForm').onsubmit = function(e) {
            e.preventDefault();
            const id = document.getElementById('courseId').value;
            const data = {
                name: document.getElementById('courseName').value,
                level: document.getElementById('courseLevel').value,
                duration: document.getElementById('courseDuration').value,
                status: document.getElementById('courseStatus').value
            };

            if (id) {
                update('courseTypes', id, data);
                toast("Course Type updated");
            } else {
                data.id = generateId('CT');
                create('courseTypes', data);
                toast("Course Type created");
            }
            closeModal('courseModal');
            loadData();
        }
    </script>
</body>
</html>
